<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID PTR</title>
    <!-- Diagnostic runtime error catcher -->
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            const div = document.createElement('div');
            div.style.position = 'fixed';
            div.style.top = '0';
            div.style.left = '0';
            div.style.width = '100%';
            div.style.backgroundColor = '#ff3366';
            div.style.color = '#ffffff';
            div.style.padding = '20px';
            div.style.zIndex = '999999';
            div.style.fontFamily = 'monospace';
            div.style.whiteSpace = 'pre-wrap';
            div.innerText = 'SYSTEM FAULT ENCOUNTERED:\n\n' + message + '\n\nSource: ' + source + '\nLine: ' + lineno + ':' + colno + '\n\nStack Trace:\n' + (error ? error.stack : 'N/A');
            document.body.appendChild(div);
            return false;
        };
    </script>
    <link rel="stylesheet" href="style.css">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=JetBrains+Mono:wght@400;700&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
</head>
<body>
    <!-- CRT Screen Overlay Effect -->
    <div class="crt-overlay"></div>
    <div class="crt-scanlines"></div>

    <div id="game-container">
        <!-- Canvas for rendering the grid and all menu layers -->
        <canvas id="game-canvas"></canvas>
    </div>



    <!-- Main Game Script Loader -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
